<!DOCTYPE html>
<html>
<head>
    <title>Event Registration Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:#f4f4f4;
        }

        .container{
            width:400px;
            padding:30px;
            background:white;
            border-radius:10px;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-top:10px;
            margin-bottom:5px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:20px;
            border:none;
            border-radius:5px;
            background:#007bff;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        #result{
            margin-top:15px;
            text-align:center;
            color:green;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Event Registration</h2>

    <form id="form">

        <label>Username</label>
        <input type="text" id="name" placeholder="Enter Username" required>

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter Email" required>

        <label>Event Name</label>
        <input type="text" id="event" placeholder="Enter Event Name" required>

        <button type="submit">Register</button>

    </form>

    <p id="result"></p>

</div>

<script>

document.getElementById("form").addEventListener("submit", function(e){

    e.preventDefault();

    let data = {

        name: document.getElementById("name").value,

        email: document.getElementById("email").value,

        event: document.getElementById("event").value

    };

    fetch("http://localhost:5000/register", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify(data)

    })

    .then(response => response.json())

    .then(result => {

        document.getElementById("result").innerHTML =
        result.message;

    })

    .catch(error => {

        document.getElementById("result").innerHTML =
        "Error connecting to server";

        console.log(error);

    });

});

</script>

</body>
</html>
